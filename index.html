        // Automatic High Efficiency Image Compression to Base64 (Strictly keeps output <1MB)
        const compressImageToBase64 = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        const MAX_WIDTH = 800;
                        const MAX_HEIGHT = 800;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // Compress quality to 0.7 to guarantee base64 string is highly optimized
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        resolve(compressedBase64);
                    };
                };
                reader.onerror = (error) => reject(error);
            });
        };

                        setInstallingStatus(prev => ({ ...prev, [app.id]: 'Installed' }));
                        showToast(`Successfully installed ${app.name}! You can now leave a community review.`, "success");

                                                <i className="fa-solid fa-chevron-right"></i>
                                            </button>

                                                { name: 'Productivity', icon: 'fa-solid fa-rocket', color: 'bg-sky-100 text-sky-600' },

                                                    <div className={`h-11 w-11 rounded-full ${cat.color} flex items-center justify-center text-sm shadow-sm`}>

                                                            <span>{app.downloads}</span>
                                                        </div>

                                                                    ? 'bg-slate-100 text-slate-700 relative overflow-hidden'

                                                            ? 'bg-slate-200 text-slate-700'
                                                            : 'bg-brand-500 hover:bg-brand-600 text-white shadow-brand-500/20'

                                                {typeof installingStatus[selectedApp.id] === 'number' ? `Installing ${installingStatus[selectedApp.id]}%` : installingStatus[selectedApp.id] === 'Installed' ? 'Installed' : 'Install Device Pack'}

                                    </div>

                                        <div>
                                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Package Size</p>

                                        <div>
                                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Downloads</p>

                                                            src={selectedApp.youtubeVideo} 
                                                            className="absolute inset-0 w-full h-full" 
                                                            allowFullScreen 
                                                            title="YouTube video player"

                                                    </div>
                                                </div>

                                        </div>

                                                                <div className="text-amber-400 text-xs">{"★".repeat(rev.rating)}</div>
                                                            </div>
                                                            <p className="text-slate-600 text-xs leading-relaxed">{rev.comment}</p>
                                                        </div>
                                                    ))

                                            </div>

                                        </div>
                                    )}

                                </div>

                                                                    <input 
                                                                        type="file" 
                                                                        accept="image/*" 
                                                                        onChange={(e) => handleImageDeviceUpload(e, (res) => setNewAppForm(prev => ({ ...prev, logo: res })))} 
                                                                        className="hidden" 
                                                                        id="app-logo-uploader"

                                                                        <i className="fa-solid fa-cloud-arrow-up"></i> Upload Logo image from computer (Compressed &lt;1MB)
                                                                    </label>
                                                                </div>
                                                            </div>

                                                                    <span className="text-xs font-semibold text-slate-700">Contains Advertisements</span>
                                                                </label>

                                                                </div>
                                                            </div>
                                                        ))

                                                </div>
                                            </div>

                                                                    </div>
                                                                    <div className="flex gap-2">

                                                                </div>
                                                            </div>
                                                        ))
                                                    )}
                                                </div>
                                            </div>

                                        </div>
                                    )}

                                </div>
                            )}
