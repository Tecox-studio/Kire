<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIRE - Apps & Games Appstore</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons CDN -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            overflow-x: hidden; 
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .toast-enter { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { 
            from { transform: translateY(100%) scale(0.95); opacity: 0; } 
            to { transform: translateY(0) scale(1); opacity: 1; } 
        }
        /* Fluid transitions for sliding carousel banners */
        .carousel-container {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body>

    <div id="app" class="flex h-screen overflow-hidden w-screen">
        <!-- SPA viewports render dynamically here -->
        <div class="flex items-center justify-center w-full h-full bg-white">
            <div class="flex flex-col items-center space-y-4">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-sm font-semibold text-slate-500 animate-pulse">Initializing KIRE Secure Cloud...</p>
            </div>
        </div>
    </div>

    <!-- Global Toast Notifications Overlay -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[250] flex flex-col gap-3"></div>

    <script type="module">
        // --- STREAMING_CHUNK: Importing official production-ready Firebase SDK scripts ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            signInAnonymously, 
            signInWithPopup, 
            GoogleAuthProvider, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            signOut,
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            getDoc, 
            setDoc, 
            updateDoc, 
            deleteDoc, 
            onSnapshot, 
            collection, 
            query, 
            addDoc, 
            getDocs 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Provided Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCUVhNYsiqsqJou9In33MmHZf6qxEI0y6w",
            authDomain: "kire-c4bc9.firebaseapp.com",
            databaseURL: "https://kire-c4bc9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kire-c4bc9",
            storageBucket: "kire-c4bc9.firebasestorage.app",
            messagingSenderId: "470102182672",
            appId: "1:470102182672:web:6703aeb6dbba08dbfdf395",
            measurementId: "G-C8X2ZC89WB"
        };

        // Initialize App & Services
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(auth);
        const googleProvider = new GoogleAuthProvider();

        // Strict Path Variables following Rule 1
        const appId = "kire-c4bc9-app";
        const publicPath = (coll) => collection(db, 'artifacts', appId, 'public', 'data', coll);

        // Global App State
        let state = {
            view: 'home', // home, app_details, account, publisher, admin_login, admin
            searchQuery: '',
            currentUser: { id: null, name: 'Guest', email: '', isPublisher: false, publisherId: null },
            apps: [],
            publishers: [],
            reviews: [],
            bannerRequests: [],
            currentAppId: null,
            currentHeroSlideIndex: 0,
            carouselInterval: null,
            
            // Onboarding & Auth States
            authMode: 'login', // login, signup
            authEmail: '',
            authPassword: '',
            pubForm: { name: '', email: '', avatarUrl: '' },
            
            // Publisher App Upload Form States
            appForm: { name: '', pkg: '', shortDesc: '', fullDesc: '', category: 'Action', price: 'Free', apkLink: '', apkFileName: '', logoUrl: '', bannerUrl: '' },
            reviewForm: { rating: 5, comment: '' },
            
            pubView: 'dashboard', // dashboard, publish, reviews
            adminView: 'apps', // apps, publishers, banners
            adminEditApp: null,
            expandedPublisherId: null
        };

        // Seed data for clean initial startup
        const defaultAppsSeed = [
            { id: 'app_1', publisherId: 'pub1', name: 'WhatsApp Messenger', packageName: 'com.whatsapp', shortDescription: 'Simple. Personal. Real-time messaging.', fullDescription: 'WhatsApp from Meta is a FREE messaging and video calling app used by over 2B people. It’s simple, reliable, and private.', category: 'Social', price: 'Free', logoUrl: 'https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg', bannerUrl: 'https://images.unsplash.com/photo-1614680376593-902f74cf0d41?auto=format&fit=crop&q=80&w=1000', rating: 4.8, reviewsCount: 185, isFeatured: true, apkLink: '' },
            { id: 'app_2', publisherId: 'pub1', name: 'Instagram', packageName: 'com.instagram', shortDescription: 'Bring you closer to the people and things you love.', fullDescription: 'Connect with friends, share what you are up to, or see what is new from others all over the world.', category: 'Social', price: 'Free', logoUrl: 'https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg', bannerUrl: 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?auto=format&fit=crop&q=80&w=1000', rating: 4.5, reviewsCount: 132, isFeatured: true, apkLink: '' },
            { id: 'app_3', publisherId: 'pub2', name: 'PUBG MOBILE', packageName: 'com.tencent.ig', shortDescription: 'Epic mobile battle royale shooter.', fullDescription: 'PUBG MOBILE is the original Battle Royale mobile game and one of the best mobile shooting games.', category: 'Action', price: 'Free', logoUrl: 'https://play-lh.googleusercontent.com/JRd05pyBH41qjgsJuWduRJpDeZG0Hnb0yq2GU500Z9E8N0B4WwU0E2H2W4N7e2V3eA=w240-h480-rw', bannerUrl: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=1000', rating: 4.6, reviewsCount: 45, isFeatured: true, apkLink: '' },
            { id: 'app_4', publisherId: 'pub2', name: 'Clash of Clans', packageName: 'com.supercell.clashofclans', shortDescription: 'Epic strategy card-battle gameplay.', fullDescription: 'Join millions of players worldwide as you build your village, raise a clan, and compete in epic Clan Wars!', category: 'Strategy', price: 'Free', logoUrl: 'https://play-lh.googleusercontent.com/LByrur1mTmPeLR0ig_ij6b70yZ8vz6IAR-94lX3kZ15gq73V7I4mD5L1y_w3x3x3x3x3=w240-h480-rw', bannerUrl: 'https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&q=80&w=1000', rating: 4.6, reviewsCount: 60, isFeatured: false, apkLink: '' }
        ];

        // --- STREAMING_CHUNK: Authenticating secure credentials and launching real-time listeners ---
        async function authenticateAndSync() {
            try {
                // Initialize database collection listeners
                onSnapshot(publicPath('apps'), (snapshot) => {
                    let appsList = [];
                    snapshot.forEach(doc => appsList.push(doc.data()));
                    if (appsList.length === 0) {
                        defaultAppsSeed.forEach(async (appItem) => {
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'apps', appItem.id), appItem);
                        });
                    } else {
                        state.apps = appsList;
                        render();
                    }
                }, (error) => console.error("Apps listener error: ", error));

                onSnapshot(publicPath('publishers'), (snapshot) => {
                    let pubsList = [];
                    snapshot.forEach(doc => pubsList.push(doc.data()));
                    state.publishers = pubsList;
                    syncCurrentUserPublisherStatus();
                    render();
                }, (error) => console.error("Publishers listener error: ", error));

                onSnapshot(publicPath('reviews'), (snapshot) => {
                    let reviewsList = [];
                    snapshot.forEach(doc => reviewsList.push(doc.data()));
                    state.reviews = reviewsList;
                    render();
                }, (error) => console.error("Reviews listener error: ", error));

                onSnapshot(publicPath('bannerRequests'), (snapshot) => {
                    let requestsList = [];
                    snapshot.forEach(doc => requestsList.push(doc.data()));
                    state.bannerRequests = requestsList;
                    render();
                }, (error) => console.error("Banner requests listener error: ", error));

                // Real Fireauth listener
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        state.currentUser.id = user.uid;
                        state.currentUser.name = user.displayName || user.email.split('@')[0];
                        state.currentUser.email = user.email || '';
                        syncCurrentUserPublisherStatus();
                    } else {
                        state.currentUser = { id: null, name: 'Guest', email: '', isPublisher: false, publisherId: null };
                    }
                    render();
                });

            } catch (err) {
                showToast("Connection to Firebase was interrupted.", "error");
                console.error(err);
            }
        }

        // Synchronize logged-in user with their Firestore publisher registration
        function syncCurrentUserPublisherStatus() {
            if (!state.currentUser.id) return;
            const myPubProfile = state.publishers.find(p => p.id === state.currentUser.id);
            if (myPubProfile) {
                state.currentUser.isPublisher = true;
                state.currentUser.publisherId = myPubProfile.id;
                state.currentUser.name = myPubProfile.name;
            } else {
                state.currentUser.isPublisher = false;
                state.currentUser.publisherId = null;
            }
        }

        // Custom notification engine
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-enter flex items-center p-4 rounded-xl shadow-lg text-white font-medium ${type === 'success' ? 'bg-slate-900 border border-slate-800' : 'bg-red-600'}`;
            toast.innerHTML = `
                <i class="ph-fill ${type === 'success' ? 'ph-check-circle text-emerald-400' : 'ph-warning-circle'} text-xl mr-3"></i>
                <span class="text-sm font-semibold tracking-wide">${message}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px) scale(0.95)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function fileToBase64(file, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => callback(reader.result);
            reader.onerror = error => showToast("Error loading file binary", "error");
        }

        // Router & Navigation
        window.navigate = (view, appIdParam = null) => {
            if (view === 'app_details' && appIdParam) {
                window.location.hash = `#app=${appIdParam}`;
            } else if (view === 'home') {
                window.location.hash = ``;
            } else {
                window.location.hash = `#${view}`;
            }
        };

        window.handleSearch = (val) => { state.searchQuery = val; render(); };

        window.copyShareLink = (appIdParam) => {
            const link = `${window.location.origin}${window.location.pathname}#app=${appIdParam}`;
            const el = document.createElement('textarea');
            el.value = link;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("App shareable link copied!");
        };

        // Routing Hash Handler
        function handleRouting() {
            const hash = window.location.hash;
            if (hash === '#tecox-admin-2010') {
                state.view = 'admin_login';
            } else if (hash.startsWith('#app=')) {
                const appIdParam = hash.split('=')[1];
                state.view = 'app_details';
                state.currentAppId = appIdParam;
            } else if (hash === '#account') {
                state.view = 'account';
            } else if (hash === '#publisher') {
                state.view = 'publisher';
            } else {
                state.view = 'home';
                state.currentAppId = null;
            }
            render();
        }

        window.addEventListener('hashchange', handleRouting);
        window.addEventListener('DOMContentLoaded', () => {
            authenticateAndSync();
            handleRouting();
        });

        // --- STREAMING_CHUNK: Automated Rotating Multi-Banner Carousel Engine ---
        function startCarouselRotation() {
            if (state.carouselInterval) clearInterval(state.carouselInterval);
            state.carouselInterval = setInterval(() => {
                const featuredApps = state.apps.filter(a => a.isFeatured);
                const bannerCount = featuredApps.length || 1;
                state.currentHeroSlideIndex = (state.currentHeroSlideIndex + 1) % bannerCount;
                
                const sliderContainer = document.getElementById('hero-slider');
                if (sliderContainer) {
                    const offset = state.currentHeroSlideIndex * -100;
                    sliderContainer.style.transform = `translateX(${offset}%)`;
                    
                    const dots = document.querySelectorAll('.carousel-dot');
                    dots.forEach((dot, idx) => {
                        if (idx === state.currentHeroSlideIndex) {
                            dot.classList.add('bg-white', 'w-8');
                            dot.classList.remove('bg-white/45', 'w-2.5');
                        } else {
                            dot.classList.add('bg-white/45', 'w-2.5');
                            dot.classList.remove('bg-white', 'w-8');
                        }
                    });
                }
            }, 3500);
        }

        // --- STREAMING_CHUNK: Base UI Components Assembly ---
        const Sidebar = () => `
            <div class="w-64 bg-white h-screen border-r border-slate-100 flex flex-col hidden md:flex flex-shrink-0">
                <div class="p-6 flex items-center space-x-2 cursor-pointer" onclick="navigate('home')">
                    <h1 class="text-3xl font-black text-blue-600 tracking-tighter">KIRE</h1>
                </div>
                <div class="flex-1 overflow-y-auto px-4 space-y-1 scrollbar-hide">
                    <button onclick="navigate('home')" class="w-full flex items-center space-x-3 p-3 rounded-xl transition-all ${state.view === 'home' ? 'bg-blue-50 text-blue-600 font-bold' : 'text-slate-600 hover:bg-slate-50'}"><i class="ph ${state.view === 'home' ? 'ph-house-fill' : 'ph-house'} text-xl"></i><span class="text-sm">Home</span></button>
                    <button onclick="navigate('home')" class="w-full flex items-center space-x-3 p-3 rounded-xl transition-all text-slate-600 hover:bg-slate-50"><i class="ph ph-squares-four text-xl"></i><span class="text-sm">Apps</span></button>
                    <button onclick="navigate('home')" class="w-full flex items-center space-x-3 p-3 rounded-xl transition-all text-slate-600 hover:bg-slate-50"><i class="ph ph-game-controller text-xl"></i><span class="text-sm">Games</span></button>
                    
                    <div class="pt-4 pb-2"><p class="text-[10px] font-bold text-slate-400 uppercase px-3 tracking-wider">Discover</p></div>
                    <button class="w-full flex items-center space-x-3 p-3 rounded-xl transition-all text-slate-600 hover:bg-slate-50"><i class="ph ph-chart-line-up text-xl"></i><span class="text-sm">Top charts</span></button>
                    <button class="w-full flex items-center space-x-3 p-3 rounded-xl transition-all text-slate-600 hover:bg-slate-50"><i class="ph ph-stack text-xl"></i><span class="text-sm">Categories</span></button>
                    <button class="w-full flex items-center space-x-3 p-3 rounded-xl transition-all text-slate-600 hover:bg-slate-50"><i class="ph ph-medal text-xl"></i><span class="text-sm">Editor's choice</span></button>
                    <button class="w-full flex items-center space-x-3 p-3 rounded-xl transition-all text-slate-600 hover:bg-slate-50"><i class="ph ph-tag text-xl"></i><span class="text-sm">Offers</span></button>
                    
                    <div class="pt-4 pb-2"><p class="text-[10px] font-bold text-slate-400 uppercase px-3 tracking-wider">Profile Workspace</p></div>
                    <button onclick="navigate('account')" class="w-full flex items-center space-x-3 p-3 rounded-xl transition-all ${state.view === 'account' || state.view === 'publisher' ? 'bg-blue-50 text-blue-600 font-bold' : 'text-slate-600 hover:bg-slate-50'}"><i class="ph ${state.view === 'account' ? 'ph-user-fill' : 'ph-user'} text-xl"></i><span class="text-sm">Developer Sign In</span></button>
                </div>
                
                <div class="p-4 m-4 bg-blue-50/50 rounded-2xl border border-blue-100">
                    <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white mb-2"><i class="ph-fill ph-sketch-logo text-lg"></i></div>
                    <h4 class="font-bold text-blue-900 text-xs">KIRE Premium</h4>
                    <p class="text-[10px] text-blue-700/80 mt-1 mb-3">No ads, extra rewards and more!</p>
                    <button class="w-full bg-blue-600 text-white text-[10px] font-bold py-2 rounded-lg hover:bg-blue-700 transition-colors">Learn more</button>
                </div>
            </div>
        `;

        const Topbar = () => `
            <div class="sticky top-0 z-40 bg-white/95 border-b border-slate-100 p-4 flex items-center justify-between">
                <div class="flex items-center flex-1 max-w-2xl gap-4">
                    <div class="relative w-full">
                        <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                        <input type="text" placeholder="Search for apps & games" value="${state.searchQuery}" onkeyup="handleSearch(this.value)" class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-100 rounded-full text-xs outline-none focus:bg-white focus:border-blue-500 transition-all">
                    </div>
                </div>
                <div class="flex items-center space-x-3 ml-4">
                    <button class="text-slate-500 hover:bg-slate-50 p-2 rounded-full"><i class="ph ph-bell text-lg"></i></button>
                    <button onclick="navigate('account')" class="flex items-center space-x-2 p-1 pr-3 rounded-full hover:bg-slate-50 border border-slate-100 transition-all">
                        <div class="w-7 h-7 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-xs">${state.currentUser.name.charAt(0)}</div>
                        <span class="text-xs font-semibold text-slate-700 hidden sm:block">${state.currentUser.name}</span>
                    </button>
                </div>
            </div>
        `;

        const AppIconComponent = (url, name, cls) => `
            <div class="${cls} rounded-2xl overflow-hidden bg-white shadow-sm flex-shrink-0 border border-slate-100 flex items-center justify-center">
                ${url ? `<img src="${url}" class="w-full h-full object-cover">` : `<span class="font-extrabold text-blue-600 text-xl">${name.charAt(0)}</span>`}
            </div>
        `;

        // --- STREAMING_CHUNK: Render dynamic home store layout with sliding advertising slots ---
        const HomeView = () => {
            const featuredApps = state.apps.filter(a => a.isFeatured);
            const displayApps = state.apps.filter(a => a.name.toLowerCase().includes(state.searchQuery.toLowerCase()));
            const topApps = displayApps.filter(a => a.category === 'Social' || a.category === 'Productivity').slice(0, 5);
            const topGames = displayApps.filter(a => ['Action', 'Strategy', 'Racing', 'Puzzle'].includes(a.category)).slice(0, 5);
            
            const cats = [
                {n:'Action', i:'🚀'}, {n:'Adventure', i:'🧭'}, {n:'Racing', i:'🏎️'},
                {n:'Puzzle', i:'🧩'}, {n:'Strategy', i:'👑'}, {n:'Sports', i:'⚽'}
            ];

            return `
                <div class="max-w-6xl mx-auto p-6 md:p-8 space-y-10 pb-20">
                    
                    <!-- Sliding Advertising Banner -->
                    <div class="relative w-full h-[320px] rounded-[2rem] overflow-hidden shadow-xl group bg-slate-950">
                        <div id="hero-slider" class="carousel-container h-full w-full">
                            ${featuredApps.length ? featuredApps.map(app => `
                                <div class="w-full h-full flex-shrink-0 relative cursor-pointer" onclick="navigate('app_details', '${app.id}')" style="width: 100%;">
                                    <img src="${app.bannerUrl}" class="absolute inset-0 w-full h-full object-cover">
                                    <div class="absolute inset-0 bg-gradient-to-r from-slate-950/95 via-slate-950/60 to-transparent"></div>
                                    <div class="absolute inset-0 p-8 md:p-12 flex flex-col justify-center max-w-lg">
                                        <span class="bg-blue-600 text-white text-[9px] font-bold px-3 py-1 rounded-full w-max flex items-center space-x-1 mb-4">
                                            <i class="ph-fill ph-megaphone text-white mr-1"></i> <span class="tracking-widest">FEATURED AD</span>
                                        </span>
                                        <h2 class="text-3xl md:text-5xl font-black text-white tracking-tight leading-none mb-3 truncate">${app.name}</h2>
                                        <p class="text-slate-300 text-sm line-clamp-2 mb-6">${app.shortDescription}</p>
                                        <div class="flex items-center space-x-3">
                                            <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs py-3 px-8 rounded-full transition-colors shadow-lg">Install Now</button>
                                        </div>
                                    </div>
                                </div>
                            `).join('') : `
                                <div class="w-full h-full flex-shrink-0 relative">
                                    <div class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center text-white text-center p-8">
                                        <i class="ph ph-storefront text-5xl text-blue-500 mb-2"></i>
                                        <h2 class="text-2xl font-black">Welcome to KIRE Store</h2>
                                        <p class="text-slate-400 text-xs max-w-md mt-1">Become a verified publisher, submit APK packages and request free sliding ads now!</p>
                                    </div>
                                </div>
                            `}
                        </div>

                        <!-- Dots indicator -->
                        <div class="absolute bottom-5 left-12 flex space-x-2 z-10">
                            ${featuredApps.map((_, idx) => `
                                <div class="carousel-dot h-2.5 rounded-full transition-all duration-300 ${idx === 0 ? 'bg-white w-8' : 'bg-white/45 w-2.5'}"></div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Pills Categories -->
                    <div class="flex space-x-3 overflow-x-auto pb-2 scrollbar-hide">
                        ${cats.map(c => `
                            <button class="flex items-center space-x-2 px-5 py-2.5 rounded-full border border-slate-100 bg-white hover:bg-slate-50 transition-colors shadow-sm flex-shrink-0">
                                <span class="text-sm font-bold text-slate-700">${c.i} ${c.n}</span>
                            </button>
                        `).join('')}
                    </div>

                    <!-- Live Released Apps -->
                    <section>
                        <div class="flex justify-between items-center mb-6">
                            <div class="flex items-center space-x-2">
                                <span class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-ping"></span>
                                <h3 class="text-lg font-black text-slate-800 tracking-tight">Newly Released Apps & Games</h3>
                            </div>
                            <span class="text-xs bg-slate-100 text-slate-600 px-3 py-1 rounded-full font-bold">Realtime database</span>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
                            ${state.apps.slice(0, 8).map(app => `
                                <div onclick="navigate('app_details', '${app.id}')" class="bg-white rounded-3xl border border-slate-100 shadow-sm hover:shadow-md hover:border-slate-200 transition-all cursor-pointer overflow-hidden flex flex-col group">
                                    <div class="h-32 w-full bg-slate-100 relative overflow-hidden">
                                        ${app.bannerUrl ? `<img src="${app.bannerUrl}" class="w-full h-full object-cover group-hover:scale-103 transition-transform duration-500">` : `<div class="w-full h-full flex items-center justify-center text-slate-300"><i class="ph ph-game-controller text-4xl"></i></div>`}
                                    </div>
                                    <div class="p-4 flex items-center space-x-3 relative">
                                        ${AppIconComponent(app.logoUrl, app.name, 'w-12 h-12 -mt-8 border-2 border-white absolute z-10')}

                                                <button onclick="delApp('${appItem.id}')" class="flex-1 md:flex-none px-4 py-2 bg-rose-50 text-rose-600 rounded-lg text-[10px] font-extrabold tracking-wide hover:bg-rose-100/80 transition-colors">Delete Release</button>
                                            </div>
                                        </div>
                                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                            <h4 class="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider mb-3">Live Reviews (${state.reviews.filter(r=>r.appId===appItem.id).length})</h4>
                                            <div class="space-y-2">
                                                ${state.reviews.filter(r=>r.appId===appItem.id).map(rev => `
                                                    <div class="flex justify-between items-center text-xs py-2 bg-white px-4 rounded-lg border border-slate-100">
                                                        <span class="flex-1 truncate text-slate-600"><strong class="mr-2 text-slate-800">${rev.userName}:</strong>${rev.comment}</span>
                                                        <span class="text-amber-500 font-bold mx-4 bg-amber-50 px-2 py-0.5 rounded text-[10px]">${rev.rating}★</span>
                                                        <button onclick="delRev('${rev.id}')" class="text-rose-400 hover:text-rose-600 transition-colors"><i class="ph-bold ph-trash"></i></button>
                                                    </div>
                                                `).join('')}
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        ` : state.adminView === 'publishers' ? `
                            <h2 class="text-xl font-black text-slate-800 tracking-tight border-b border-slate-200 pb-4 mb-6">Production Logs: Onboarded Publishers</h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                ${state.publishers.map(pub => {
                                    const pubAppsList = state.apps.filter(a => a.publisherId === pub.id);
                                    const isExpanded = state.expandedPublisherId === pub.id;
                                    return `
                                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                            <div class="flex items-center justify-between cursor-pointer" onclick="togglePublisherApps('${pub.id}')">
                                                <div class="flex items-center space-x-3">
                                                    <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center font-extrabold text-sm">${pub.name.charAt(0)}</div>
                                                    <div>
                                                        <h3 class="font-extrabold text-slate-800 text-sm leading-tight">${pub.name}</h3>
                                                        <p class="text-[10px] text-slate-400 font-bold mt-0.5">${pub.email} • ID: ${pub.id}</p>
                                                    </div>
                                                </div>
                                                <i class="ph ph-caret-down text-slate-400 transition-transform ${isExpanded ? 'rotate-180' : ''}"></i>
                                            </div>
                                            
                                            ${isExpanded ? `
                                                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 mt-4 animate-fadeIn">
                                                    <strong class="text-[10px] text-slate-400 uppercase tracking-wider mb-2 block">Released App Packages (${pubAppsList.length})</strong>
                                                    <ul class="text-xs font-semibold text-slate-600 space-y-1.5">
                                                        ${pubAppsList.length ? pubAppsList.map(a => `<li class="flex items-center"><i class="ph-bold ph-caret-right text-slate-400 mr-1 text-[9px]"></i> ${a.name}</li>`).join('') : '<li class="text-slate-400 italic">No packages published yet</li>'}
                                                    </ul>
                                                </div>
                                            ` : ''}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        ` : `
                            <h2 class="text-xl font-black text-slate-800 tracking-tight border-b border-slate-200 pb-4 mb-6">Marketing Campaign Requests</h2>
                            <div class="space-y-4">
                                ${state.bannerRequests.length === 0 ? '<div class="p-12 text-center bg-white rounded-2xl text-slate-400 font-semibold text-xs border border-slate-100 shadow-sm">No promotional requests pending.</div>' : 
                                    state.bannerRequests.map(req => {
                                        return `
                                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row items-center justify-between gap-6">
                                                <div class="flex items-center space-x-4 w-full md:w-auto">
                                                    ${req.bannerUrl ? `<img src="${req.bannerUrl}" class="w-40 h-20 object-cover rounded-xl shadow-sm border border-slate-100">` : `<div class="w-40 h-20 bg-slate-50 rounded-xl flex items-center justify-center text-[10px] font-bold text-slate-300">No banner visual linked</div>`}
                                                    <div>
                                                        <h4 class="font-extrabold text-slate-800 text-sm leading-tight">${req.appName}</h4>
                                                        <p class="text-[10px] text-slate-400 font-bold mt-1">Publisher: <span class="text-blue-600 font-bold">${req.publisherName}</span></p>
                                                    </div>
                                                </div>
                                                <div class="flex space-x-2 w-full md:w-auto">
                                                    <button onclick="approveBanner('${req.id}', '${req.appId}')" class="flex-1 md:flex-none px-5 py-3 bg-slate-900 hover:bg-black text-white text-[10px] font-bold rounded-xl shadow-md transition-colors">Approve & Feature</button>
                                                    <button onclick="rejectBanner('${req.id}')" class="flex-1 md:flex-none px-5 py-3 bg-rose-50 text-rose-600 text-[10px] font-bold rounded-xl hover:bg-rose-100/80 transition-colors">Reject Request</button>
                                                </div>
                                            </div>
                                        `;
                                    }).join('')
                                }
                            </div>
                        `}
                    </div>

                    <!-- Asset Edit Modal Overlay -->
                    ${state.adminEditApp ? `
                        <div class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div class="bg-white p-6 md:p-8 rounded-3xl w-full max-w-md shadow-2xl border border-slate-100">
                                <h3 class="text-base font-black mb-6 text-slate-800">Edit App Visuals: <span class="text-blue-600 font-bold">${state.adminEditApp.name}</span></h3>
                                <div class="space-y-4">
                                    <div>
                                        <label class="block text-[11px] font-bold text-slate-600 mb-1">App Logo URL</label>
                                        <input type="text" value="${state.adminEditApp.logoUrl}" onkeyup="handleEditForm('logoUrl', this.value)" class="w-full border border-slate-200 p-3 rounded-xl text-xs outline-none focus:border-blue-500 font-sans">
                                    </div>
                                    <div>
                                        <label class="block text-[11px] font-bold text-slate-600 mb-1">Feature Banner URL</label>
                                        <input type="text" value="${state.adminEditApp.bannerUrl}" onkeyup="handleEditForm('bannerUrl', this.value)" class="w-full border border-slate-200 p-3 rounded-xl text-xs outline-none focus:border-blue-500 font-sans">
                                    </div>
                                </div>
                                <div class="mt-6 flex justify-end space-x-2">
                                    <button onclick="closeEditModal()" class="px-5 py-2.5 bg-slate-50 border border-slate-100 text-slate-600 text-xs font-bold rounded-xl hover:bg-slate-100 transition-colors">Cancel</button>
                                    <button onclick="saveAppEdit()" class="px-5 py-2.5 bg-slate-900 text-white text-xs font-bold rounded-xl hover:bg-black transition-colors shadow-md">Apply visual changes</button>
                                </div>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        };

        // --- STREAMING_CHUNK: SPA viewport render router ---
        function render() {
            const root = document.getElementById('app');
            let content = '';

            if (state.view === 'admin_login') {
                content = AdminLogin();
            } else if (state.view === 'admin') {
                content = AdminDashboard();
            } else if (state.view === 'publisher') {
                content = PublisherConsole();
            } else {
                let mainView = '';
                if (state.view === 'home') mainView = HomeView();
                else if (state.view === 'app_details') mainView = AppDetailsView();
                else if (state.view === 'account') mainView = AccountView();

                content = `
                    ${Sidebar()}
                    <div class="flex-1 flex flex-col min-w-0 bg-slate-50">
                        ${Topbar()}
                        <main class="flex-1 overflow-x-hidden overflow-y-auto">
                            ${mainView}
                        </main>
                    </div>
                `;
            }

            root.innerHTML = content;

            // Trigger rotating multi-banner carousel when homepage is mounted
            if (state.view === 'home') {
                startCarouselRotation();
            }
        }
    </script>
</body>
</html>
